stage: dpo
model_config: configs/model_config.yaml
tokenizer_path: tokenizer/minillm_tokenizer.json
data_path: data/dpo_v2/train.jsonl
eval_data_path: data/dpo_v2/valid.jsonl
policy_init: checkpoints/base.pt
ref_init: checkpoints/base.pt
beta: 0.05
batch_size: 4
gradient_accumulation_steps: 4
max_steps: 200
learning_rate: 1.0e-5
min_lr: 1.0e-6
weight_decay: 0.01
warmup_steps: 20
max_grad_norm: 1.0
dtype: float16
save_every: 50
eval_every: 25
checkpoint_dir: checkpoints
checkpoint_name: dpo.pt
