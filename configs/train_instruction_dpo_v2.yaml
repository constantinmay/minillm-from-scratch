stage: dpo
model_config: configs/model_config.yaml
tokenizer_path: tokenizer/minillm_tokenizer.json
data_path: data/instruction_dpo_v2/train.jsonl
eval_data_path: data/instruction_dpo_v2/valid.jsonl
policy_init: checkpoints/instruction_sft/sft.pt
ref_init: checkpoints/instruction_sft/sft.pt
