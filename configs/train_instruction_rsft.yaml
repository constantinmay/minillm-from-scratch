stage: sft
model_config: configs/model_config.yaml
tokenizer_path: tokenizer/minillm_tokenizer.json
data_path: data/instruction_alignment/rsft_train.jsonl
eval_data_path: data/instruction_alignment/rsft_valid.jsonl
base_model_path: checkpoints/instruction_sft/sft.pt
batch_size: 8
gradient_accumulation_steps: 4
max_steps: 300
learning_rate: 5.0e-6
min_lr: 5.0e-7
weight_decay: 0.01
warmup_steps: 40
max_grad_norm: 1.0
dtype: float16
save_every: 100
eval_every: 50
checkpoint_dir: checkpoints/instruction_rsft
checkpoint_name: rsft.pt
pretrain_loss_weight: 0.02
