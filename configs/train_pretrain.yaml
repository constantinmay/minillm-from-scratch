stage: pretrain
model_config: configs/model_config.yaml
tokenizer_path: tokenizer/minillm_tokenizer.json
data_path: data/processed/train.bin
eval_data_path: data/processed/valid.bin
batch_size: 16
gradient_accumulation_steps: 8
max_steps: 30000
learning_rate: 3.0e-4
min_lr: 3.0e-5
weight_decay: 0.1
warmup_steps: 1000
max_grad_norm: 1.0
dtype: float16
save_every: 5000
eval_every: 1000
log_every: 100
checkpoint_dir: checkpoints
generate_every: 2000
num_generate_samples: 3
generate_max_new_tokens: 128
