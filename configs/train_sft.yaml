stage: sft
model_config: configs/model_config.yaml
tokenizer_path: tokenizer/minillm_tokenizer.json
data_path: data/sft_v2/train.jsonl
eval_data_path: data/sft_v2/valid.jsonl
base_model_path: checkpoints/base.pt
batch_size: 8
gradient_accumulation_steps: 4
max_steps: 100
learning_rate: 5.0e-6
min_lr: 5.0e-7
weight_decay: 0.01
warmup_steps: 20
max_grad_norm: 1.0
dtype: float16
save_every: 25
eval_every: 25
checkpoint_dir: checkpoints
checkpoint_name: sft.pt
pretrain_loss_weight: 0.2
