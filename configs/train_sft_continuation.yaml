stage: sft
seed: 42
model_config: configs/model_config.yaml
tokenizer_path: tokenizer/minillm_tokenizer.json
data_path: data/instruction_sft_continuation/train.jsonl
eval_data_path: data/instruction_sft_continuation/valid.jsonl
base_model_path: checkpoints/base.pt
allow_random_init: false
batch_size: 8
gradient_accumulation_steps: 4
max_steps: 7500
learning_rate: 2.0e-5
min_lr: 2.0e-6
weight_decay: 0.01
warmup_steps: 400
max_grad_norm: 1.0
dtype: float16
save_every: 1000
eval_every: 500
checkpoint_dir: checkpoints/instruction_sft_continuation
checkpoint_name: sft.pt
pretrain_loss_weight: 0.05
